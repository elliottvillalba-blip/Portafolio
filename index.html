<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portafolio - Elliot Villalba</title>
    <style>
        /* --- VARIABLES DE DISEÑO Y CONFIGURACIÓN --- */
        :root {
            --bg-principal: #ffffff;
            --bg-secundario: #fcfcfc;
            --texto-principal: #111111;
            --texto-secundario: #555555;
            --borde: #e5e5e5;
            --fuente: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--fuente);
            color: var(--texto-principal);
            background-color: var(--bg-principal);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        .contenedor {
            max-width: 1140px;
            margin: 0 auto;
            padding: 0 24px;
        }

        a {
            text-decoration: none;
            color: inherit;
            transition: opacity 0.2s ease;
        }

        a:hover {
            opacity: 0.7;
        }

        section {
            padding: 100px 0;
            border-bottom: 1px solid var(--borde);
        }

        /* --- HEADER / NAVEGACIÓN --- */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            background-color: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            z-index: 1000;
            border-bottom: 1px solid var(--borde);
        }

        header .contenedor {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 80px;
        }

        .logo-header {
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: 2px;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 32px;
        }

        nav ul a {
            font-size: 0.95rem;
            font-weight: 500;
        }

        /* --- SECCIÓN 1: HERO (INICIO) --- */
        #inicio {
            min-height: 90vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding-top: 140px;
        }

            font-size: 1.5rem;
            color: var(--texto-secundario);
            margin-bottom: 16
