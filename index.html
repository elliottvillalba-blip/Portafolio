<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portafolio - Elliot Villalba</title>
    <style>
        /* --- ESTILOS GENERALES Y VARIABLES --- */
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f8f9fa;
            --text-main: #1a1a1a;
            --text-muted: #666666;
            --accent: #000000;
            --accent-hover: #333333;
            --border-color: #e0e0e0;
            --font-stack: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-stack);
            color: var(--text-main);
            background-color: var(--bg-primary);
            line-height: 1.6;
        }

        a {
            text-decoration: none;
            color: inherit;
            transition: all 0.3s ease;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* --- HEADER & NAVEGACIÓN --- */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background-color: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(5px);
            z-index: 1000;
            border-bottom: 1px solid var(--border-color);
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 80px;
        }

        .logo {
            font-weight: 800;
            font-size: 1.5rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .nav-menu {
            display: flex;
            gap: 30px;
            list-style: none;
        }

        .nav-menu a {
            font-weight: 500;
            font-size: 1rem;
        }

        .nav-menu a:hover {
            color: var(--text-muted);
        }

        /* --- SECCIÓN HERO --- */
        .hero {
            padding-top: 160px;
            padding-bottom: 80px;
            min-height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .hero-title-wrapper {
            margin-bottom: 40px;
        }

        .hero-greeting {
            font-size: 2rem;
            font-weight: 400;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        .hero-main-title {
            font-size: 4.5rem;
            font-weight: 900;
            line-height: 1.1;
            text-transform: uppercase;
            letter-spacing: -1px;
        }

        .hero-main-title span {
            display: block;
        }

        .hero-main-title .ux-ui {
            color: var(--text-muted);
        }

        /* Grid de Logotipos de Clientes/Marcas */
        .brands-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-top: 60px;
            border-top: 1px solid var(--border-color);
            padding-top: 40px;
        }
