<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elliot Villalba — Diseñador UX/UI</title>
<style>
  :root{
    --dark: #16232a;
    --dark-2: #101a1f;
    --blue: #2f8fe6;
    --blue-dark: #1f6fc0;
    --purple: #d9b8f0;
    --gray-light: #e4e4e4;
    --gray-card: #e9e9e9;
    --cyan: #7ff0db;
    --text-dark: #111111;
    --text-gray: #6b6b6b;
  }

  *{ box-sizing: border-box; margin: 0; padding: 0; }

  body{
    font-family: 'Helvetica Neue', Arial, sans-serif;
    color: var(--text-dark);
    background: #ffffff;
    -webkit-font-smoothing: antialiased;
  }

  a{ text-decoration: none; color: inherit; }
  ul{ list-style: none; }
  img{ display: block; max-width: 100%; }

  .wrap{
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 40px;
  }

  /* ===== HEADER + HERO ===== */
  .hero-outer{
    background: var(--dark);
    border-radius: 0 0 28px 28px;
    overflow: hidden;
    position: relative;
  }

  header.nav{
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 24px 40px;
    max-width: 1200px;
    margin: 0 auto;
  }

  .logo-pill{
    background: var(--purple);
    color: #2a2a2a;
    font-weight: 800;
    font-size: 13px;
    letter-spacing: 0.5px;
    padding: 8px 18px;
    border-radius: 20px;
  }

  .nav-links{
    display: flex;
    gap: 36px;
    color: #ffffff;
    font-size: 15px;
  }

  .nav-links a{ opacity: 0.9; }
  .nav-links a:hover{ opacity: 1; }

  .btn-blue{
    background: var(--blue);
    color: #fff;
    font-weight: 600;
    font-size: 14px;
    padding: 10px 22px;
    border-radius: 24px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    border: none;
    cursor: pointer;
  }
