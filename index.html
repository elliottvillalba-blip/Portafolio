<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portafolio - Elliot Villalba</title>
    <style>
        /* --- VARIABLES Y CONFIGURACIÓN BASE --- */
        :root {
            --bg-principal: #ffffff;
            --bg-secundario: #f9f9f9;
            --texto-principal: #1a1a1a;
            --texto-secundario: #666666;
            --acento: #000000;
            --fuente: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--fuente);
            color: var(--texto-principal);
            background-color: var(--bg-principal);
            line-height: 1.6;
        }

        .contenedor {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        a {
            text-decoration: none;
            color: inherit;
            transition: opacity 0.3s;
        }

        a:hover {
            opacity: 0.7;
        }

        section {
            padding: 80px 0;
        }

        /* --- HEADER / NAVEGACIÓN --- */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            background-color: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(5px);
            z-index: 1000;
            box-shadow: 0 1px 5px rgba(0,0,0,0.05);
        }

        header .contenedor {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 70px;
        }

        .logo {
            font-weight: bold;
            font-size: 1.2rem;
            letter-spacing: 1px;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 25px;
        }

        nav ul a {
            font-size: 0.95rem;
            font-weight: 500;
        }

        #inicio {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center
